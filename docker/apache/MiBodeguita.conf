<VirtualHost *:80>
    ServerName mibodeguita.dev.local
    DocumentRoot /var/www/html/MiBodeguita/public

    <Directory /var/www/html/MiBodeguita/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/mibodeguita_error.log
    CustomLog ${APACHE_LOG_DIR}/mibodeguita_access.log combined
</VirtualHost>